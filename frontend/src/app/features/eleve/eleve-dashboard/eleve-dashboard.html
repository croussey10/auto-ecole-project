<div class="container flex flex-column gap-4">
  <header class="surface-card p-4 md:p-5 border-round-2xl border-1 surface-border shadow-1">
    <h1 class="text-2xl md:text-3xl font-bold text-color mt-0 mb-3">
      Bonjour {{ profile()?.prenom }} 👋
    </h1>

    <div class="flex flex-column md:flex-row gap-4">
      <div
        class="flex-1 surface-ground p-3 border-round-xl border-1 surface-border flex align-items-center gap-3"
      >
        <div class="bg-primary-reverse p-3 border-circle">
          <i class="pi pi-check-circle text-primary text-xl"></i>
        </div>
        <div>
          <div class="text-xs font-semibold text-color-secondary uppercase tracking-wide">
            Heures effectuées
          </div>
          <div class="text-2xl font-bold text-color">{{ profile()?.heures_effectuees }}</div>
        </div>
      </div>

      <div
        class="flex-1 surface-ground p-3 border-round-xl border-1 surface-border flex align-items-center gap-3"
      >
        <div class="bg-primary-reverse p-3 border-circle">
          <i class="pi pi-clock text-primary text-xl"></i>
        </div>
        <div>
          <div class="text-xs font-semibold text-color-secondary uppercase tracking-wide">
            Heures restantes
          </div>
          <div class="text-2xl font-bold text-color">{{ profile()?.heures_restantes }}</div>
        </div>
      </div>
    </div>
  </header>

  <section>
    <h2 class="text-xl font-bold text-color mb-3">Mes prochaines leçons</h2>
    <app-eleve-next-lessons-list />
  </section>
</div>
