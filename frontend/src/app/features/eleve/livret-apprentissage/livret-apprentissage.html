<div class="flex align-items-center justify-content-center gap-2 mb-2">
  <div>
    <input
      type="text"
      id="search"
      pInputText
      placeholder="rechercher..."
      [(ngModel)]="search"
    >
  </div>
  <div>
    <p-multi-select
      [options]="maitrises"
      [(ngModel)]="selectedMaitrises"
      placeholder="Select maitrises"
      display="chip"
    />
  </div>
  <div>
    <p-multi-select
      [options]="categories"
      [(ngModel)]="selectedCategories"
      placeholder="Select compétences"
      display="chip"
    />
  </div>
</div>

@if (resourceCompetences.isLoading()) {
  <div class="flex justify-content-center py-6">
    <p-progress-spinner/>
  </div>
} @else {
  @for (competence of filter(); track competence.id) {
    <app-competence-card
      [competence]="competence"
      [canEditMaitrise]="canEditMaitrise()"
      (maitriseChanged)="onMaitriseChange($event.competenceId, $event.newMaitrise)"
    />
  }
}
