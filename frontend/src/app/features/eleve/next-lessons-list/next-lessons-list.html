<p-card>
  Mes réservations à venir :
  @if (!isMobile()) {
    <p-scrollPanel [style]="{ width: '100%', height: '30rem' }">
      @for (reservation of reservations(); track reservation.id) {
        <app-next-lesson-card
          [reservation]="reservation"
          (cancelTrigger)="resourceReservation.reload()"
        />
      }
    </p-scrollPanel>
  } @else {
    <p-scrollPanel [style]="{ width: '100%', height: '21rem' }">
      @for (reservation of reservations(); track reservation.id) {
        <app-next-lesson-card
          [reservation]="reservation"
          (cancelTrigger)="resourceReservation.reload()"
        />
      }
    </p-scrollPanel>
  }
</p-card>
