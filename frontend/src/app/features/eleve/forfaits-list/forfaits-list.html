<div class="mb-4 text-center">
  <h2>Nos Forfaits et Heures</h2>
</div>

@if (resourceForfaits.isLoading()) {
  <div class="flex justify-content-center py-6">
    <p-progress-spinner/>
  </div>
} @else {
  <div class="flex  gap-4 justify-content-center p-4">
    @for (forfait of forfaits(); track forfait.id) {
      <app-forfait-card
        [forfait]="forfait"
      />
    }
  </div>
}
