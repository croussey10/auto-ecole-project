<app-auth-card [slug]="schoolSlug()">
  <div class="text-center mb-5">
    <h1 class="text-3xl font-bold text-color mb-2">Créer un compte</h1>
    <p class="text-color-secondary m-0">Rejoignez votre auto-école en quelques clics</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-4">
    <div class="flex flex-column md:flex-row gap-4">
      <div class="flex flex-column gap-2 w-full">
        <label for="firstName" class="font-semibold text-color">Prénom</label>
        <input
          formControlName="firstName"
          class="w-full p-3"
          id="firstName"
          type="text"
          pInputText
          placeholder="Jean"
        />
        <small class="invalid-feedback">Minimum 3 caractères</small>
      </div>
      <div class="flex flex-column gap-2 w-full">
        <label for="lastName" class="font-semibold text-color">Nom</label>
        <input
          formControlName="lastName"
          class="w-full p-3"
          id="lastName"
          type="text"
          pInputText
          placeholder="Dupont"
        />
        <small class="invalid-feedback">Minimum 3 caractères</small>
      </div>
    </div>

    <div class="flex flex-column gap-2">
      <label for="email" class="font-semibold text-color">Adresse e-mail</label>
      <input
        formControlName="email"
        class="w-full p-3"
        id="email"
        type="text"
        pInputText
        placeholder="exemple@email.com"
      />
      <small class="invalid-feedback">Format d'e-mail invalide</small>
    </div>

    <div class="flex flex-column gap-2">
      <label for="password" class="font-semibold text-color">Mot de passe</label>
      <p-password
        inputId="password"
        formControlName="password"
        styleClass="w-full"
        inputStyleClass="w-full p-3"
        [toggleMask]="true"
        promptLabel="Saisissez un mot de passe"
        weakLabel="Faible"
        mediumLabel="Moyen"
        strongLabel="Fort"
        placeholder="••••••••"
      />
      <small class="invalid-feedback">Minimum 6 caractères</small>
    </div>

    <div class="flex flex-column gap-3 mt-3">
      <p-button
        label="S'inscrire"
        type="submit"
        [loading]="loadingSubmit()"
        styleClass="w-full py-3 text-lg"
      />

      <div class="text-center mt-2">
        <span class="text-color-secondary">Déjà membre ? </span>
        <a
          routerLink="/auth/login/{{ schoolSlug() }}"
          class="font-medium no-underline text-primary cursor-pointer hover:underline transition-colors"
        >
          Se connecter
        </a>
      </div>
    </div>
  </form>
</app-auth-card>
