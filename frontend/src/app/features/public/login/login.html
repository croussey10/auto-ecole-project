<app-auth-card>
  <div>Se connecter</div>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="email">email</label>
      <input formControlName="email" class="w-full" id="email" type="text" pInputText />
      <small class="invalid-feedback">email invalide !</small>
    </div>
    <div class="field">
      <label for="password">password</label>
      <p-password
        inputId="password"
        formControlName="password"
        class="w-full"
        inputStyleClass="w-full"
        feedback="false"
      />
      <small class="invalid-feedback">mot de passe invalide ! (min 6 carac.)</small>
    </div>
    <a routerLink="/auth/register/{{ schoolSlug() }}"> Pas encore de compte ? </a>
    <div class="flex justify-content-center gap-2">
      <p-button label="Se connecter" type="submit" [loading]="loadingSubmit()" />
    </div>
  </form>
</app-auth-card>
