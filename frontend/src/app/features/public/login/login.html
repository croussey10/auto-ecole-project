<app-auth-card>
  <div>
    Se connecter
  </div>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="email">email</label>
      <input formControlName="email" class="w-full" id="email" type="text" pInputText>
    </div>
    <div class="field">
      <label for="password">password</label>
      <p-password inputId="password" formControlName="password" class="w-full" inputStyleClass="w-full" feedback="false"/>
    </div>
    <a routerLink="/auth/register/{{schoolSlug()}}">
      Pas encore de compte ?
    </a>
    <div class="flex justify-content-center gap-2">
      <p-button
        label="Se connecter"
        type="submit"
      />
    </div>
  </form>
</app-auth-card>
