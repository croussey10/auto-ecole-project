<app-auth-card>
  <div>
    Se connecter
  </div>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="email">email</label>
      <input formControlName="email" class="w-full" id="email" type="text" pInputText>
    </div>
    <div class="field">
      <label for="password">password</label>
      <input formControlName="password" class="w-full" id="password" type="text" pInputText>
    </div>
    <p-button
      label="Se connecter"
      type="submit"
      class="flex justify-content-center"
    />
  </form>
</app-auth-card>
