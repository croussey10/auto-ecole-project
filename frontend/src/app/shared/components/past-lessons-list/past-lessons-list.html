<p-card>
  Mes réservations passées :
  <p-scrollPanel [style]="{ width: '100%', height: heightScrollPanel() }">
    @for (reservation of reservationsPast(); track reservation.id) {
      <app-lesson-card
        [reservation]="reservation"
        [personRole]="profile()?.role == 'eleve' ? 'Moniteur : ' : 'Eleve : ' "
        [personName]="profile()?.role == 'eleve' ? `${reservation.moniteur_prenom} ${reservation.moniteur_nom}` : `${reservation.eleve_prenom} ${reservation.eleve_nom}`"
        [loadingCancel]="idBeingCancelled() == reservation.id"
        (cancelTrigger)="cancelReservation(reservation.id)"
      />
    }
  </p-scrollPanel>
</p-card>
