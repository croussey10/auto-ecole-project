@if (profileService.currentProfile()) {
  <header class="navbar-shadow p-3 mb-4">
    <div class="flex justify-content-between align-items-center">
      @if (!isMobile()) {
        <a class="flex gap-2 align-items-center">
          <img ngSrc="logo-voiture-placeholder.png" alt="logo" width="36" height="36" />
          DriveFlow
        </a>
        <div class="flex align-items-center gap-2">
          <p-button label="Logout" severity="secondary" (onClick)="logout()" />
          @for (onglet of onglets; track onglet.label) {
            <p-button label="{{ onglet.label }}" icon="{{ onglet.icon }}" styleClass="w-full" />
          }
        </div>
      } @else {
        <a class="flex gap-2 align-items-center">
          <img ngSrc="logo-voiture-placeholder.png" alt="logo" width="36" height="36" />
        </a>
        <div class="card flex justify-center">
          <p-button label="Logout" severity="secondary" (onClick)="logout()" />
          <p-drawer [(visible)]="visibleDrawer" position="right" [style]="{ width: '60%' }">
            <div class="flex flex-column gap-4">
              @for (onglet of onglets; track onglet.label) {
                <p-button
                  label="{{ onglet.label }}"
                  icon="{{ onglet.icon }}"
                  styleClass="w-full justify-content-start gap-5"
                  (onClick)="visibleDrawer.set(false)"
                />
              }
            </div>
          </p-drawer>
          <p-button (onClick)="visibleDrawer.set(true)" icon="pi pi-bars" text />
        </div>
      }
    </div>
  </header>
}
